<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crônicas do Nada Ver</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <div class="theme-btns">
    <button id="themeToggle" class="theme-btn" aria-label="Alternar tema">🌞</button>
    <button class="theme-btn" onclick="location.reload()" aria-label="Recarregar">🔄</button>
  </div>

  <div class="container">

    <!-- Perfil -->
    <div class="card profile-card">
      <img src="./images/cnv-img.png" alt="Crônicas do Nada Ver" />
      <h1>Crônicas do Nada Ver</h1>
      <p class="tagline">O que é engraçado, é o que não faz sentido!!!</p>
      <div class="social-links">
        <a href="https://www.youtube.com/@CronicasdoNadaVer" target="_blank" rel="noopener" class="btn btn-social">
          <svg class="social-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M23.5 6.2A3 3 0 0 0 21.4 4C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.4.5A3 3 0 0 0 .5 6.2C0 8.1 0 12 0 12s0 3.9.5 5.8A3 3 0 0 0 2.6 20c1.9.5 9.4.5 9.4.5s7.5 0 9.4-.5a3 3 0 0 0 2.1-2.2C24 15.9 24 12 24 12s0-3.9-.5-5.8zM9.8 15.5V8.5l6.3 3.5-6.3 3.5z"/></svg>
          YouTube
        </a>
        <a href="https://www.tiktok.com/@cronicasdonadaver" target="_blank" rel="noopener" class="btn btn-social">
          <svg class="social-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M19.6 3.3C18.5 2.1 17.7.7 17.5 0h-3.7v16.1c0 1.6-1.3 3-3 3s-3-1.3-3-3 1.3-3 3-3c.3 0 .6 0 .9.1V9.3c-.3 0-.6-.1-.9-.1C7 9.2 4 12.3 4 16.1S7 23 10.8 23c3.7 0 6.7-3 6.7-6.9V8.4c1.4.9 3 1.4 4.5 1.5V6.3c-1 0-2.2-.5-2.4-3z"/></svg>
          TikTok
        </a>
        <a href="https://www.instagram.com/cronicasdonadaver" target="_blank" rel="noopener" class="btn btn-social">
          <svg class="social-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="5"/><circle cx="17.5" cy="6.5" r="1.5" fill="currentColor" stroke="none"/></svg>
          Instagram
        </a>
      </div>
    </div>

    <!-- Player -->
    <div class="card player-card">
      <div class="tabs">
        <button class="tab active" onclick="changeTab('top10', this)">
          <svg class="tab-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M19 5h-1V3H6v2H5C3.3 5 2 6.3 2 8v1c0 2.6 1.9 4.7 4.4 5C7.2 15.9 9.4 17.5 12 18v3H9v2h6v-2h-3v-3c2.6-.5 4.8-2.1 5.6-5C20.1 12.7 22 10.6 22 8V8c0-1.7-1.3-3-3-3zM4 9V7h2v4.9C4.8 11.5 4 10.3 4 9zm16 0c0 1.3-.8 2.5-2 2.9V7h2v2z"/></svg>
          Top 10
        </button>
        <button class="tab" onclick="changeTab('novas', this)">
          <svg class="tab-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M12 1l2.7 8.3H23l-7 5.1 2.7 8.2L12 17.6l-6.7 5 2.7-8.2L2 9.3h8.3L12 1z"/></svg>
          Novas
        </button>
        <button class="tab" onclick="changeTab('todas', this)">
          <svg class="tab-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M3 6h18v2H3V6zm0 5h18v2H3v-2zm0 5h18v2H3v-2z"/></svg>
          Todas
        </button>
      </div>

      <div class="playlist-grid" id="playlist"></div>

      <div class="pagination" id="pagination"></div>

      <iframe id="musicPlayer" src="https://suno.com/embed/1717289c-3793-4b1e-b283-57d23e274628" title="Player de música"></iframe>

      <div class="player-controls">
        <button class="btn btn-control" onclick="previousSong()" aria-label="Anterior">⏮</button>
        <button class="btn btn-control" onclick="nextSong()" aria-label="Próxima">⏭</button>
      </div>
    </div>

  </div>

  <script>
    const musicDatabase = {
      top10: [
        "https://suno.com/embed/9a3cd9ef-bbc6-4a0b-80ad-7e21fd1e7217",
        "https://suno.com/embed/f3efb3ff-d999-4604-83c4-318fe97975b8",
        "https://suno.com/embed/1717289c-3793-4b1e-b283-57d23e274628",
        "https://suno.com/embed/8fbd2ee3-0bdf-4d89-9985-7e87342fa17b",
        "https://suno.com/embed/295b0222-e301-49e7-9b6c-8e288fc4a674",
        "https://suno.com/embed/4733e9b5-57d5-4e3a-90f9-1151827e8237",
        "https://suno.com/embed/dd712acc-e08f-40c8-a87c-487218890cb8",
        "https://suno.com/embed/58104e50-de45-4a7d-83d9-67e089757511",
        "https://suno.com/embed/154a5244-5d41-4513-a2b2-36573c74a909",
        "https://suno.com/embed/aa3be1b0-4639-41c3-b169-7fea446d09da",
      ],
      novas: [
        "https://suno.com/embed/a8c4edec-8198-4435-b944-70e28969e4c4",
        "https://suno.com/embed/7c2a78f6-48ab-469f-9cf5-d7c38c188591",
        "https://suno.com/embed/ca5fbac1-e10f-407a-a2cf-6e0ee290b1ce",
        "https://suno.com/embed/9750a7ad-544e-44c8-b5d6-6e8e174d2622",
        "https://suno.com/embed/ce98f9d0-af2c-47ab-9dc8-425ce3678fe9",
        "https://suno.com/embed/98216740-a4b6-4fe9-91fd-3a8b9261a909",
        "https://suno.com/embed/224c126e-d898-42b5-b637-28a4cc9ffda3",
      ]
    };
    musicDatabase.todas = [...musicDatabase.top10, ...musicDatabase.novas];

    const tabTitles = {
      top10: 'Top 10 Músicas',
      novas: 'Músicas Novas',
      todas: 'Todas as Músicas'
    };

    const SONGS_PER_PAGE = 10;
    let songs = musicDatabase.top10;
    let currentSongIndex = 0;
    let currentPage = 0;

    function changeTab(category, el) {
      songs = musicDatabase[category];
      document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
      currentSongIndex = 0;
      currentPage = 0;
      renderPlaylist();
      playSong(0);
    }

    function renderPlaylist() {
      const grid = document.getElementById('playlist');
      grid.innerHTML = '';
      const start = currentPage * SONGS_PER_PAGE;
      const end = Math.min(start + SONGS_PER_PAGE, songs.length);
      for (let i = start; i < end; i++) {
        const btn = document.createElement('button');
        btn.className = 'track-btn';
        btn.textContent = i + 1;
        btn.onclick = () => playSong(i);
        grid.appendChild(btn);
      }
      renderPagination();
      updateActive();
    }

    function renderPagination() {
      const totalPages = Math.ceil(songs.length / SONGS_PER_PAGE);
      const pag = document.getElementById('pagination');
      pag.innerHTML = '';
      if (totalPages <= 1) return;
      const prev = document.createElement('button');
      prev.className = 'btn btn-page';
      prev.textContent = '◀';
      prev.disabled = currentPage === 0;
      prev.onclick = () => { currentPage--; renderPlaylist(); };
      const info = document.createElement('span');
      info.className = 'page-info';
      info.textContent = `${currentPage + 1} / ${totalPages}`;
      const next = document.createElement('button');
      next.className = 'btn btn-page';
      next.textContent = '▶';
      next.disabled = currentPage === totalPages - 1;
      next.onclick = () => { currentPage++; renderPlaylist(); };
      pag.appendChild(prev);
      pag.appendChild(info);
      pag.appendChild(next);
    }

    function playSong(index) {
      currentSongIndex = index;
      const targetPage = Math.floor(index / SONGS_PER_PAGE);
      if (targetPage !== currentPage) {
        currentPage = targetPage;
        renderPlaylist();
      } else {
        updateActive();
      }
      document.getElementById('musicPlayer').src = songs[index];
    }

    function updateActive() {
      const start = currentPage * SONGS_PER_PAGE;
      document.querySelectorAll('.track-btn').forEach((btn, i) => {
        const songIdx = start + i;
        btn.classList.toggle('active', songIdx === currentSongIndex);
        if (songIdx === currentSongIndex) {
          btn.innerHTML = '';
          const img = document.createElement('img');
          img.src = './images/cnv-logo.png';
          img.alt = '';
          btn.appendChild(img);
        } else {
          btn.textContent = songIdx + 1;
        }
      });
    }

    function previousSong() {
      playSong((currentSongIndex - 1 + songs.length) % songs.length);
    }

    function nextSong() {
      playSong((currentSongIndex + 1) % songs.length);
    }

    renderPlaylist();

    document.getElementById('themeToggle').addEventListener('click', function () {
      document.body.classList.toggle('dark-theme');
      this.textContent = document.body.classList.contains('dark-theme') ? '🌙' : '🌞';
    });
  </script>

</body>
</html>
