<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crônicas do Nada Ver</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <div class="theme-btns">
    <button id="themeToggle" class="theme-btn" aria-label="Alternar tema">🌞</button>
    <button class="theme-btn" onclick="location.reload()" aria-label="Recarregar">🔄</button>
  </div>

  <div class="container">

    <!-- Perfil -->
    <div class="card profile-card">
      <img src="./images/cnv-img.png" alt="Crônicas do Nada Ver" />
      <h1>Crônicas do Nada Ver</h1>
      <p class="tagline">O que é engraçado, é o que não faz sentido!!!</p>
      <div class="social-links">
        <a href="https://www.youtube.com/@CronicasdoNadaVer" target="_blank" rel="noopener" class="btn btn-social">
          <svg class="social-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M23.5 6.2A3 3 0 0 0 21.4 4C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.4.5A3 3 0 0 0 .5 6.2C0 8.1 0 12 0 12s0 3.9.5 5.8A3 3 0 0 0 2.6 20c1.9.5 9.4.5 9.4.5s7.5 0 9.4-.5a3 3 0 0 0 2.1-2.2C24 15.9 24 12 24 12s0-3.9-.5-5.8zM9.8 15.5V8.5l6.3 3.5-6.3 3.5z"/></svg>
          YouTube
        </a>
        <a href="https://www.tiktok.com/@cronicasdonadaver" target="_blank" rel="noopener" class="btn btn-social">
          <svg class="social-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M19.6 3.3C18.5 2.1 17.7.7 17.5 0h-3.7v16.1c0 1.6-1.3 3-3 3s-3-1.3-3-3 1.3-3 3-3c.3 0 .6 0 .9.1V9.3c-.3 0-.6-.1-.9-.1C7 9.2 4 12.3 4 16.1S7 23 10.8 23c3.7 0 6.7-3 6.7-6.9V8.4c1.4.9 3 1.4 4.5 1.5V6.3c-1 0-2.2-.5-2.4-3z"/></svg>
          TikTok
        </a>
        <a href="https://www.instagram.com/cronicasdonadaver" target="_blank" rel="noopener" class="btn btn-social">
          <svg class="social-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="5"/><circle cx="17.5" cy="6.5" r="1.5" fill="currentColor" stroke="none"/></svg>
          Instagram
        </a>
      </div>
    </div>

    <!-- Player -->
    <div class="card player-card">
      <iframe id="musicPlayer" src="https://suno.com/embed/1717289c-3793-4b1e-b283-57d23e274628" title="Player de música"></iframe>

      <div class="player-controls">
        <button class="btn btn-control" onclick="previousSong()" aria-label="Anterior">⏮</button>
        <button class="btn btn-control" onclick="nextSong()" aria-label="Próxima">⏭</button>
      </div>

      <div class="playlist-list" id="playlist"></div>
    </div>

  </div>

  <script>
    const songs = [
      "https://suno.com/embed/9a3cd9ef-bbc6-4a0b-80ad-7e21fd1e7217",  // Música 1
      "https://suno.com/embed/f3efb3ff-d999-4604-83c4-318fe97975b8",  // Música 2
      "https://suno.com/embed/1717289c-3793-4b1e-b283-57d23e274628",  // Música 3
      "https://suno.com/embed/8fbd2ee3-0bdf-4d89-9985-7e87342fa17b",  // Música 4
      "https://suno.com/embed/295b0222-e301-49e7-9b6c-8e288fc4a674",  // Música 5
      "https://suno.com/embed/4733e9b5-57d5-4e3a-90f9-1151827e8237",  // Música 6
      "https://suno.com/embed/dd712acc-e08f-40c8-a87c-487218890cb8",  // Música 7
      "https://suno.com/embed/58104e50-de45-4a7d-83d9-67e089757511",  // Música 8
      "https://suno.com/embed/154a5244-5d41-4513-a2b2-36573c74a909",  // Música 9
      "https://suno.com/embed/aa3be1b0-4639-41c3-b169-7fea446d09da",  // Música 10
      "https://suno.com/embed/a8c4edec-8198-4435-b944-70e28969e4c4",  // Música 11
      "https://suno.com/embed/7c2a78f6-48ab-469f-9cf5-d7c38c188591",  // Música 12
      "https://suno.com/embed/ca5fbac1-e10f-407a-a2cf-6e0ee290b1ce",  // Música 13
      "https://suno.com/embed/9750a7ad-544e-44c8-b5d6-6e8e174d2622",  // Música 14
      "https://suno.com/embed/ce98f9d0-af2c-47ab-9dc8-425ce3678fe9",  // Música 15
      "https://suno.com/embed/98216740-a4b6-4fe9-91fd-3a8b9261a909",  // Música 16
      "https://suno.com/embed/224c126e-d898-42b5-b637-28a4cc9ffda3",  // Música 17
      "https://suno.com/embed/c45be741-e953-4a09-a303-9711703be971",  // Música 18
      "https://suno.com/embed/2a8dad68-ad7e-41e3-b4e5-531b2ed09281",  // Música 19
      "https://suno.com/embed/e9e9fd1f-0e67-4de2-bd8c-77268b81cd9e",  // Música 20
      "https://suno.com/embed/42940feb-81ed-4a7d-986b-ba2c5f219b1d",  // Música 21
      "https://suno.com/embed/630405ac-a00e-4cfb-812b-a7564e072dab",  // Música 22
      "https://suno.com/embed/d7ef8791-5528-4c5b-88a1-89c7d60671e8",  // Música 23
      "https://suno.com/embed/5bbd8c84-0c46-4035-b5f3-d94dcf1d80d2",  // Música 24
    ];

    let currentSongIndex = 0;

    function renderPlaylist() {
      const list = document.getElementById('playlist');
      list.innerHTML = '';
      songs.forEach((url, i) => {
        const item = document.createElement('button');
        item.className = 'playlist-item' + (i === currentSongIndex ? ' active' : '');
        item.onclick = () => playSong(i);

        const num = document.createElement('span');
        num.className = 'playlist-num';
        if (i === currentSongIndex) {
          const img = document.createElement('img');
          img.src = './images/cnv-logo.png';
          img.alt = '';
          num.appendChild(img);
        } else {
          num.textContent = i + 1;
        }

        const label = document.createElement('span');
        label.className = 'playlist-label';
        label.textContent = 'Música ' + (i + 1);

        item.appendChild(num);
        item.appendChild(label);
        list.appendChild(item);
      });
    }

    function playSong(index) {
      currentSongIndex = index;
      document.getElementById('musicPlayer').src = songs[index];
      renderPlaylist();
      const activeItem = document.querySelector('.playlist-item.active');
      if (activeItem) activeItem.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    }

    function previousSong() {
      playSong((currentSongIndex - 1 + songs.length) % songs.length);
    }

    function nextSong() {
      playSong((currentSongIndex + 1) % songs.length);
    }

    renderPlaylist();

    document.getElementById('themeToggle').addEventListener('click', function () {
      document.body.classList.toggle('dark-theme');
      this.textContent = document.body.classList.contains('dark-theme') ? '🌙' : '🌞';
    });
  </script>

</body>
</html>
